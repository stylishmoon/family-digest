name: family-digest

on:
  schedule:
    # Digest sáng: 23:25 UTC = 6:25 sáng VN (chạy trước 6:30 một chút,
    # lưu ý cron GitHub có thể trễ 5-15 phút)
    - cron: "25 23 * * *"
    # Kéo tin Telegram + tạo event: mỗi 3 tiếng
    - cron: "0 */3 * * *"
  workflow_dispatch: {}   # cho phép chạy tay để test

permissions:
  contents: write         # để commit state.json

concurrency:
  group: family-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Đánh dấu lượt chạy digest nếu là cron 23:25 UTC
          DIGEST_RUN: ${{ github.event.schedule == '25 23 * * *' && '1' || '0' }}
        run: python src/main.py

      - name: Commit state
        run: |
          git config user.name "family-digest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update state [skip ci]"
          git push
